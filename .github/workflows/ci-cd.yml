name: CI/CD Hola Mundo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar SOLO la app
        run: dotnet restore HolaMundoApp.csproj

      - name: Compilar SOLO la app
        run: dotnet build HolaMundoApp.csproj --no-restore

      - name: Ejecutar pruebas
        run: echo "Tests omitidos en CI"

      - name: Construir imagen Docker
        run: docker build -t esmeraly/hola-mundo-app:latest .

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Subir imagen a Docker Hub
        run: docker push esmeraly/hola-mundo-app:latest